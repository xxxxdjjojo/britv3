# pnpm 10 reads build-allowlist and overrides from here, not package.json.
# (The package.json "pnpm" field is ignored on this pnpm version.)

onlyBuiltDependencies:
  - "@sentry/cli"
  - esbuild
  - sharp
  - unrs-resolver

# BRIT-S002 — force patched versions of vulnerable transitive deps.
# Keys use version-range selectors so each major line is patched IN PLACE
# (no forced major bumps) — every target below is the latest patched release
# within the same major as what was installed.
overrides:
  "protobufjs@<7.6.1": "7.6.4"
  "@grpc/grpc-js@<1.14.4": "1.14.4"
  "esbuild@<0.28.1": "0.28.1"
  "fast-uri@<=3.1.1": "3.1.2"
  "flatted@<=3.4.1": "3.4.2"
  "happy-dom@<=20.8.8": "20.10.4"
  "lodash@<=4.17.23": "4.18.1"
  "dompurify@<3.4.9": "3.4.10"
  "path-to-regexp@>=8.0.0 <8.4.0": "8.4.2"
  "picomatch@<2.3.2": "2.3.2"
  "picomatch@>=4.0.0 <4.0.4": "4.0.4"
  "undici@>=7.0.0 <7.24.0": "7.28.0"
  # Bare pin (range-selector key didn't apply against vitest's vite specifier).
  # Dev-only dependency, so forcing the patched 7.3.5 across the tree is safe.
  "vite": "7.3.5"
  "ws@>=7.0.0 <7.5.11": "7.5.11"
  "ws@>=8.0.0 <8.21.0": "8.21.0"
