# OWASP ZAP Baseline Scan Configuration
# Rules listed here are suppressed to reduce known false positives for Britestate.
#
# Format: RULE_ID  ACTION  [PARAMETER  [#EVIDENCE]]
# Actions: IGNORE, WARN, FAIL
#
# See: https://www.zaproxy.org/docs/desktop/addons/active-scan-rules/
#      https://www.zaproxy.org/docs/desktop/addons/passive-scan-rules/

# 10021: X-Content-Type-Options Header Missing
# Suppressed because Next.js sets this header automatically in production.
# Verify with: curl -I https://staging.britestate.com | grep X-Content-Type-Options
10021	IGNORE	(X-Content-Type-Options Header Missing)

# 10038: Content Security Policy (CSP) Header Not Set
# Suppressed because we use nonce-based CSP set in middleware.ts.
# ZAP's baseline scanner may not correctly parse nonce-based CSP headers.
# Verify CSP is active: curl -I https://staging.britestate.com | grep Content-Security-Policy
10038	IGNORE	(Content Security Policy (CSP) Header Not Set)

# 10055: CSP Scanner -- reported when nonce is used
# ZAP flags nonce-based CSP as potentially unsafe due to nonce reuse concerns.
# Our nonces are per-request (crypto.randomUUID base64), so this is a false positive.
10055	IGNORE	(CSP Scanner)
