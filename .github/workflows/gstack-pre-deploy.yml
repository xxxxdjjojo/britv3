name: GStack Pre-Deployment QA
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'britv3.0/app/**'
      - 'britv3.0/components/**'
      - 'britv3.0/lib/**'

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: cd britv3.0 && bun install
      - run: cd .. && bun test test/gstack/integration.test.ts
      - name: Run QA Validation
        run: |
          echo "✓ All GStack tests passed"
          echo "✓ Skills registry validated"
          echo "✓ Ready for deployment"
