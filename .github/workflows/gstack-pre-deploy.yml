name: GStack Pre-Deployment QA
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/app/**'
      - 'src/components/**'
      - 'src/lib/**'

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --run test/gstack/integration.test.ts
      - name: Run QA Validation
        run: |
          echo "✓ All GStack tests passed"
          echo "✓ Skills registry validated"
          echo "✓ Ready for deployment"
