name: PPD Monthly Sync

on:
  schedule:
    # Run on the 2nd of each month at 6am UTC
    # Land Registry typically publishes monthly updates on the last working day
    - cron: "0 6 2 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    name: Sync PPD Monthly Update
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run monthly sync
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/sync-ppd-monthly.ts

      - name: Log result
        if: always()
        run: echo "PPD monthly sync completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
