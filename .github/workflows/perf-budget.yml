# Performance budget gate.
# Builds a production bundle, serves it, and runs:
#   1. e2e/perf route-status guard (critical routes return < 400)
#   2. vitest bundle budget (Recharts code-split off the detail first load)
#   3. Lighthouse CI against homepage + property detail (hard budgets)
#   4. Isolated vouch/referral public and authenticated median budgets
name: Perf budget

on:
  pull_request:
    paths:
      - ".github/workflows/perf-budget.yml"
      - "src/**"
      - "next.config.ts"
      - "lighthouserc.json"
      - "lighthouserc.vouch-referral*"
      - "e2e/perf/**"
      - "e2e/vouch-referral*"
      - "e2e/fixtures/vouch-referral-proof.ts"
      - "playwright.vouch-referral.config.ts"
      - "scripts/e2e-vouch-referral*"
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key"
      STRIPE_SECRET_KEY: "sk_test_ci"
      STRIPE_WEBHOOK_SECRET: "whsec_ci"
      QUOTE_SIGNING_SECRET: "ci-quote-signing-secret"
      NEXT_PUBLIC_ENABLE_SEARCH_LIVE_DATA: "false"
      PERF_BASE_URL: "http://localhost:3004"
      PLAYWRIGHT_SKIP_WEB_SERVER: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (production)
        run: pnpm build

      - name: Bundle budget (vitest)
        run: pnpm exec vitest run src/perf --reporter=dot

      - name: Start production server
        run: |
          PORT=3004 pnpm start &
          npx --yes wait-on http://localhost:3004/ --timeout 60000

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Route-status guard (e2e/perf)
        run: pnpm exec playwright test e2e/perf/critical-routes-status.spec.ts --project=chromium --no-deps

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun

  vouch-referral-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Prepare isolated database, fixtures, and production build
        run: scripts/e2e-vouch-referral-local.sh prepare-only

      - name: Start exact production build
        run: |
          PORT=3014 pnpm start > /tmp/vouch-referral-next.log 2>&1 &
          npx --yes wait-on http://127.0.0.1:3014/join --timeout 120000

      - name: Public vouch/referral Lighthouse median
        run: npx --yes @lhci/cli@0.14.x autorun --config=lighthouserc.vouch-referral.json

      - name: Authenticated provider progress Lighthouse median
        env:
          PERF_BASE_URL: http://127.0.0.1:3014
        run: npx --yes @lhci/cli@0.14.x autorun --config=lighthouserc.vouch-referral-authenticated.cjs

      - name: Upload feature Lighthouse evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vouch-referral-lighthouse
          path: test-results/evidence/vouch-referral/
          if-no-files-found: error
