# Type check, Lint, Unit tests, and Build are GATING (a failure fails the PR).
# Lint became gating once main reached 0 ESLint errors (PR #83) — see the Lint step.
# The Link E2E step stays continue-on-error (flaky env deps); the real end-to-end
# ship gate is the post-deploy Playwright smoke test against the live Vercel URL
# (see e2e/production-smoke.spec.ts).
name: App CI

on:
  # Run on ALL pull requests (no path filter) so the required `app` check
  # reports on every PR — including docs-only and migration-only PRs — and
  # branch protection cannot deadlock them.
  pull_request:
  workflow_dispatch:

jobs:
  route-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Route integrity
        run: pnpm test:routes

  app:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key"
      STRIPE_SECRET_KEY: "sk_test_ci"
      STRIPE_WEBHOOK_SECRET: "whsec_ci"
      QUOTE_SIGNING_SECRET: "ci-quote-signing-secret"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Check migration versions
        run: pnpm check:migrations

      - name: Check brand references
        run: pnpm check:brand

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      # Gating: main is at 0 ESLint errors as of PR #83. Keep it that way —
      # a non-gating lint step is how 48 errors silently accumulated before.
      # `pnpm lint` fails only on errors; the ~111 existing warnings stay non-blocking.
      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test -- --run

      - name: Build
        run: pnpm build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Link E2E
        run: pnpm exec playwright test e2e/link-health.spec.ts e2e/homepage-link-audit.spec.ts e2e/navigation.spec.ts e2e/dashboard-navigation.spec.ts --project=chromium
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
