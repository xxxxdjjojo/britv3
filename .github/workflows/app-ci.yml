# Type check, Lint, Unit tests, and Build are GATING (a failure fails the PR).
# Lint became gating once main reached 0 ESLint errors (PR #83) — see the Lint step.
# Link integrity and the isolated vouch/referral browser suite are hard gates.
name: App CI

on:
  # Run on ALL pull requests (no path filter) so the required `app` check
  # reports on every PR — including docs-only and migration-only PRs — and
  # branch protection cannot deadlock them.
  pull_request:
  workflow_dispatch:

jobs:
  db-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Real PostgreSQL contract tests
        run: pnpm test:db

  route-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Route integrity
        run: pnpm test:routes

  landlord-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SKIP_ENV_VALIDATION: "true"
      STRIPE_SECRET_KEY: "sk_test_ci"
      STRIPE_WEBHOOK_SECRET: "whsec_ci"
      QUOTE_SIGNING_SECRET: "ci-quote-signing-secret"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Landlord maintenance/compliance smoke
        run: scripts/e2e-local.sh landlord-maintenance-compliance-smoke

      - name: Upload landlord smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: landlord-smoke-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload landlord smoke screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: landlord-smoke-test-results
          path: test-results/
          if-no-files-found: ignore

  vouch-referral-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ship-gate contract checks
        env:
          PLAYWRIGHT_SKIP_WEB_SERVER: "true"
        run: pnpm exec playwright test e2e/vouch-referral-infrastructure.spec.ts --project=chromium --no-deps

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Vouch/referral desktop and mobile proof
        run: scripts/e2e-vouch-referral-local.sh

      - name: Existing authenticated dashboard link coverage
        run: pnpm exec playwright test e2e/dashboard-navigation.spec.ts --project=chromium

      - name: Upload vouch/referral evidence and traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vouch-referral-evidence
          path: |
            test-results/evidence/vouch-referral/
            playwright-report/vouch-referral/
          if-no-files-found: ignore

  app:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "true"
      NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key"
      STRIPE_SECRET_KEY: "sk_test_ci"
      STRIPE_WEBHOOK_SECRET: "whsec_ci"
      QUOTE_SIGNING_SECRET: "ci-quote-signing-secret"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Check migration versions
        run: pnpm check:migrations

      - name: Check brand references
        run: pnpm check:brand

      - name: Check test collection
        run: pnpm check:test-collection

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      # Gating: main is at 0 ESLint errors as of PR #83. Keep it that way —
      # a non-gating lint step is how 48 errors silently accumulated before.
      # `pnpm lint` fails only on errors; the ~111 existing warnings stay non-blocking.
      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test -- --run

      - name: Build
        run: pnpm build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Link E2E
        run: pnpm exec playwright test e2e/link-health.spec.ts e2e/homepage-link-audit.spec.ts e2e/navigation.spec.ts --project=chromium --no-deps

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
